name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach the installer to"
        required: true

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build bundle
        run: pyinstaller packaging/keybridge.spec

      - name: Smoke test with no system Python
        shell: pwsh
        run: |
          # Approximate a Python-free machine: remove Python from PATH and run the bundled
          # exe (it carries its own interpreter). Confirm it stays up and serves on :8765.
          # Headless runner has no real desktop, so use Qt's offscreen platform.
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Python' -and $_ -notmatch 'hostedtoolcache' }) -join ';'
          $p = Start-Process -FilePath "dist/KeyBridge/KeyBridge.exe" -PassThru
          # The proof we want: the bundle loads with no system Python and the server binds.
          # (GUI process lifetime isn't asserted -- a headless runner has no real desktop.)
          $bound = $null
          foreach ($i in 1..20) {
            Start-Sleep -Seconds 2
            $bound = Get-NetTCPConnection -LocalPort 8765 -State Listen -ErrorAction SilentlyContinue
            if ($bound -or $p.HasExited) { break }
          }
          $log = Get-ChildItem "$env:LOCALAPPDATA/KeyBridge/logs/*.log" -ErrorAction SilentlyContinue | Select-Object -Last 1
          if ($log) { Write-Host "----- launcher log -----"; Get-Content $log.FullName -Tail 40 }
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
          if (-not $bound) { throw "Server never bound :8765 (process exited=$($p.HasExited), code=$($p.ExitCode)) -- see log above" }
          Write-Host "OK: the bundled host ran with no system Python on PATH and bound :8765"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        run: iscc packaging/keybridge.iss

      - name: Attach installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) { gh release create $tag --generate-notes }
          gh release upload $tag packaging/Output/KeyBridge-Setup.exe --clobber
